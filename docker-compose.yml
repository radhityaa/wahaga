# =================================
# WhatsApp Gateway - Docker Compose
# =================================
# 
# Quick Start:
#   docker compose up -d
#
# Database: Built-in SQLite (no configuration needed)
# Redis: Uses host Redis if available, otherwise uses in-memory cache
#
# =================================

services:
  # =================================
  # WhatsApp Gateway API + Dashboard
  # =================================
  whatsapp-gateway:
    image: ghcr.io/radhityaa/wahaga:${WA_VERSION:-latest}
    container_name: whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Core
      - NODE_ENV=production
      - PORT=3000
      
      # Base URL for Swagger (set to your domain, e.g., https://api.example.com)
      - BASE_URL=${BASE_URL:-}
      
      # Database (SQLite built-in, no config needed)
      # Uncomment below to use external MySQL instead:
      # - DATABASE_URL=mysql://root:password@host.docker.internal:3306/whatsapp_gateway
      
      # Redis - use host's Redis (aaPanel) or leave empty for in-memory cache
      # Use host.docker.internal to connect to host machine's Redis
      - REDIS_URL=${REDIS_URL:-}
      
      # API Security
      - API_KEY=${API_KEY:-}
      
      # Swagger
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - SWAGGER_USERNAME=${SWAGGER_USERNAME:-}
      - SWAGGER_PASSWORD=${SWAGGER_PASSWORD:-}
      
      # Dashboard
      - DASHBOARD_ENABLED=${DASHBOARD_ENABLED:-true}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      
      # Default Webhook
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_EVENTS=${WEBHOOK_EVENTS:-*}
      
      # WhatsApp
      - WA_MAX_SESSIONS=${WA_MAX_SESSIONS:-20}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persistent storage
      - wa_data:/app/data
      - wa_sessions:/app/storage/sessions
      - wa_uploads:/app/storage/uploads
    extra_hosts:
      # Allow container to connect to host services (Redis, MySQL, etc)
      - "host.docker.internal:host-gateway"
    networks:
      - whatsapp-network

volumes:
  wa_data:
    name: whatsapp_data
  wa_sessions:
    name: whatsapp_sessions
  wa_uploads:
    name: whatsapp_uploads

networks:
  whatsapp-network:
    driver: bridge
    name: whatsapp_network
