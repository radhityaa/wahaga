version: "3.8"

# =================================
# WhatsApp Gateway - Docker Compose
# =================================
# 
# Quick Start:
#   docker compose up -d
#
# Database: Built-in SQLite (no configuration needed)
# Redis: Optional for caching
#
# =================================

services:
  # =================================
  # WhatsApp Gateway API + Dashboard
  # =================================
  whatsapp-gateway:
    build: .
    image: whatsapp-gateway:latest
    container_name: whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Core
      - NODE_ENV=production
      - PORT=3000
      
      # Database (SQLite built-in, no config needed)
      # Uncomment below to use external MySQL instead:
      # - DATABASE_URL=mysql://root:password@mysql:3306/whatsapp_gateway
      
      # Redis (optional)
      - REDIS_URL=redis://redis:6379
      
      # API Security
      - API_KEY=${API_KEY:-}
      
      # Swagger
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - SWAGGER_USERNAME=${SWAGGER_USERNAME:-}
      - SWAGGER_PASSWORD=${SWAGGER_PASSWORD:-}
      
      # Dashboard
      - DASHBOARD_ENABLED=${DASHBOARD_ENABLED:-true}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      
      # Default Webhook
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_EVENTS=${WEBHOOK_EVENTS:-*}
      
      # WhatsApp
      - WA_MAX_SESSIONS=${WA_MAX_SESSIONS:-20}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persistent storage
      - wa_data:/app/data
      - wa_sessions:/app/storage/sessions
      - wa_uploads:/app/storage/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - whatsapp-network

  # =================================
  # Redis Cache (Optional but recommended)
  # =================================
  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-network

volumes:
  wa_data:
    name: whatsapp_data
  wa_sessions:
    name: whatsapp_sessions
  wa_uploads:
    name: whatsapp_uploads
  redis_data:
    name: whatsapp_redis

networks:
  whatsapp-network:
    driver: bridge
    name: whatsapp_network
